name: "Repository Hygiene"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  hygiene:
    name: "Schema + Binary Hygiene"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run repository hygiene checks
        run: bash scripts/repo_hygiene_check.sh
