<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emerging Companies Monitor</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1d2129; --line:#2a2f3a;
    --txt:#e6e9ef; --muted:#9aa3b2; --red:#ff5d5d; --amber:#ffb02e;
    --green:#3ecf8e; --neutral:#5b6472; --accent:#6ea8fe;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 20px 60px}
  h1{font-size:20px;margin:0 0 2px} .sub{color:var(--muted);font-size:13px}
  .cards{display:flex;gap:12px;flex-wrap:wrap;margin:20px 0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:14px 16px;min-width:120px;flex:1}
  .card .n{font-size:24px;font-weight:700} .card .l{color:var(--muted);font-size:12px}
  .card.red .n{color:var(--red)} .card.amber .n{color:var(--amber)}
  .card.green .n{color:var(--green)}
  h2{font-size:15px;margin:26px 0 10px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.06em}
  .alerts{display:flex;flex-direction:column;gap:8px}
  .alert{display:flex;gap:12px;align-items:flex-start;background:var(--panel);
    border:1px solid var(--line);border-left:4px solid var(--neutral);
    border-radius:8px;padding:10px 14px}
  .alert.RED{border-left-color:var(--red)} .alert.AMBER{border-left-color:var(--amber)}
  .alert .co{font-weight:600;min-width:150px} .alert .meta{color:var(--muted);font-size:12px}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;
    text-transform:uppercase;letter-spacing:.04em}
  .pill.RED{background:rgba(255,93,93,.15);color:var(--red)}
  .pill.AMBER{background:rgba(255,176,46,.15);color:var(--amber)}
  .pill.GREEN{background:rgba(62,207,142,.15);color:var(--green)}
  .pill.NEUTRAL{background:rgba(91,100,114,.18);color:var(--muted)}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:8px 0 12px}
  .toolbar input{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:8px 12px;min-width:240px;outline:none}
  .fbtn{background:var(--panel2);border:1px solid var(--line);color:var(--muted);
    border-radius:20px;padding:6px 14px;cursor:pointer;font-size:12px}
  .fbtn.active{color:var(--txt);border-color:var(--accent)}
  table{width:100%;border-collapse:collapse;background:var(--panel);
    border:1px solid var(--line);border-radius:10px;overflow:hidden}
  th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:12px;cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:var(--txt)}
  tr.row{cursor:pointer} tr.row:hover{background:var(--panel2)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle}
  .dot.RED{background:var(--red)} .dot.AMBER{background:var(--amber)}
  .dot.GREEN{background:var(--green)} .dot.NEUTRAL{background:var(--neutral)}
  .status{font-size:12px;font-weight:600}
  .status.Strengthening{color:var(--green)} .status.Stable{color:var(--accent)}
  .status.Watch{color:var(--amber)} .status.Weakening{color:var(--amber)}
  .status.Broken{color:var(--red)}
  .detail{background:var(--panel2);padding:0 16px}
  .detail .inner{padding:14px 0;display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .detail h4{margin:0 0 6px;font-size:12px;color:var(--muted);text-transform:uppercase}
  .thesis p{margin:0 0 8px} .thesis .k{color:var(--muted)}
  .annlist{display:flex;flex-direction:column;gap:6px}
  .ann{font-size:13px;padding:7px 10px;background:var(--panel);border:1px solid var(--line);
    border-radius:7px;border-left:3px solid var(--neutral)}
  .ann.RED{border-left-color:var(--red)} .ann.AMBER{border-left-color:var(--amber)}
  .ann.GREEN{border-left-color:var(--green)}
  .ann .s{display:block} .ann .m{color:var(--muted);font-size:11px;margin-top:2px}
  .ann a{color:var(--accent);text-decoration:none} .ann a:hover{text-decoration:underline}
  .nodata{color:var(--amber);font-size:12px}
  .foot{margin-top:34px;padding-top:16px;border-top:1px solid var(--line);
    color:var(--muted);font-size:12px}
  .hide{display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>Emerging Companies Monitor</h1>
  <div class="sub" id="subline"></div>

  <div class="cards" id="cards"></div>

  <h2>Early-Warning Alerts <span id="alertwin" class="sub"></span></h2>
  <div class="alerts" id="alerts"></div>

  <h2>Watchlist</h2>
  <div class="toolbar">
    <input id="search" placeholder="Search company / symbol / sector…">
    <button class="fbtn active" data-f="ALL">All</button>
    <button class="fbtn" data-f="RED">Red</button>
    <button class="fbtn" data-f="AMBER">Amber</button>
    <button class="fbtn" data-f="GREEN">Green</button>
  </div>
  <table>
    <thead><tr>
      <th data-k="company">Company</th>
      <th data-k="sector">Sector</th>
      <th data-k="thesis_status">Thesis</th>
      <th data-k="conviction">Conviction</th>
      <th data-k="new_count">New</th>
      <th data-k="worst_flag">Flag</th>
      <th data-k="last_reviewed">Reviewed</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="foot" id="foot"></div>
</div>

<script>
const DATA = {"generated_at": "02 Jun 2026, 19:11", "lookback_days": 21, "source": "BSE corporate announcements", "summary": {"names": 6, "red": 2, "amber": 1, "green": 3, "neutral": 0, "new_total": 10, "no_data": 0}, "alerts": [{"subject": "Resignation of Chief Financial Officer (CFO) with effect from 31 May 2026", "category": "Change in Directors/KMP", "date_sort": "2026-05-31T20:11:00", "date": "31 May 2026, 20:11", "attachment": "https://www.bseindia.com/xml-data/corpfiling/AttachLive/demo_syrma_cfo.pdf", "flag": "RED", "keyword": "resignation of chief financial officer", "company": "Syrma SGS Technology", "symbol": "SYRMA", "code": "543573"}, {"subject": "Creation of Encumbrance - Pledge of shares by promoter group", "category": "Encumbrance", "date_sort": "2026-05-30T15:48:00", "date": "30 May 2026, 15:48", "attachment": "https://www.bseindia.com/xml-data/corpfiling/AttachLive/demo_azad_pledge.pdf", "flag": "RED", "keyword": "pledge", "company": "Azad Engineering", "symbol": "AZAD", "code": "544090"}, {"subject": "Disclosure under Reg. 30 - Credit Rating outlook revised to Negative by CRISIL", "category": "Credit Rating", "date_sort": "2026-05-28T13:20:00", "date": "28 May 2026, 13:20", "attachment": "https://www.bseindia.com/xml-data/corpfiling/AttachLive/demo_syrma_rating.pdf", "flag": "AMBER", "keyword": "credit rating", "company": "Syrma SGS Technology", "symbol": "SYRMA", "code": "543573"}, {"subject": "Credit Rating reaffirmed at AA-/Stable by ICRA", "category": "Credit Rating", "date_sort": "2026-05-21T14:02:00", "date": "21 May 2026, 14:02", "attachment": "https://www.bseindia.com/xml-data/corpfiling/AttachLive/demo_apar_rating.pdf", "flag": "AMBER", "keyword": "credit rating", "company": "Apar Industries", "symbol": "APARINDS", "code": "532259"}], "companies": [{"bse_code": "543664", "nse_symbol": "KAYNES", "company": "Kaynes Technology India", "sector": "EMS / Electronics Manufacturing", "thesis_status": "Stable", "conviction": "High", "original_thesis": "Niche high-mix low-volume EMS with OSAT/semiconductor optionality; long customer qualification cycles create stickiness.", "watch_items": "Margin trajectory as semicon capex ramps; working capital stretch.", "position": "2.5%", "last_reviewed": "2026-05-20", "worst_flag": "GREEN", "counts": {"RED": 0, "AMBER": 0, "GREEN": 2, "NEUTRAL": 0}, "new_count": 2, "has_data": true, "announcements": [{"subject": "Intimation of Capacity Expansion - Commissioning of new SMT lines at Mysuru facility", "category": "Company Update", "date_sort": "2026-05-29T11:00:00", "date": "29 May 2026, 11:00", "attachment": "https://www.bseindia.com/xml-data/corpfiling/AttachLive/demo_kaynes_capex.pdf", "flag": "GREEN", "keyword": "capacity expansion"}, {"subject": "Announcement under Regulation 30 - Acquisition of majority stake in OSAT venture", "category": "Acquisition", "date_sort": "2026-05-27T09:35:00", "date": "27 May 2026, 09:35", "attachment": "https://www.bseindia.com/xml-data/corpfiling/AttachLive/demo_kaynes_acq.pdf", "flag": "GREEN", "keyword": "acquisition"}]}, {"bse_code": "543573", "nse_symbol": "SYRMA", "company": "Syrma SGS Technology", "sector": "EMS / Electronics Manufacturing", "thesis_status": "Watch", "conviction": "Medium", "original_thesis": "Diversified EMS riding India electronics localisation; design-led mix should lift margins.", "watch_items": "Customer concentration; RM pass-through lag compressing margins.", "position": "1.0%", "last_reviewed": "2026-05-18", "worst_flag": "RED", "counts": {"RED": 1, "AMBER": 1, "GREEN": 0, "NEUTRAL": 0}, "new_count": 2, "has_data": true, "announcements": [{"subject": "Resignation of Chief Financial Officer (CFO) with effect from 31 May 2026", "category": "Change in Directors/KMP", "date_sort": "2026-05-31T20:11:00", "date": "31 May 2026, 20:11", "attachment": "https://www.bseindia.com/xml-data/corpfiling/AttachLive/demo_syrma_cfo.pdf", "flag": "RED", "keyword": "resignation of chief financial officer"}, {"subject": "Disclosure under Reg. 30 - Credit Rating outlook revised to Negative by CRISIL", "category": "Credit Rating", "date_sort": "2026-05-28T13:20:00", "date": "28 May 2026, 13:20", "attachment": "https://www.bseindia.com/xml-data/corpfiling/AttachLive/demo_syrma_rating.pdf", "flag": "AMBER", "keyword": "credit rating"}]}, {"bse_code": "543428", "nse_symbol": "DATAPATTNS", "company": "Data Patterns India", "sector": "Defence Electronics", "thesis_status": "Strengthening", "conviction": "High", "original_thesis": "Vertically integrated defence electronics with high entry barriers and indigenisation tailwind.", "watch_items": "Order inflow lumpiness; receivables from government customers.", "position": "2.0%", "last_reviewed": "2026-05-22", "worst_flag": "GREEN", "counts": {"RED": 0, "AMBER": 0, "GREEN": 1, "NEUTRAL": 1}, "new_count": 2, "has_data": true, "announcements": [{"subject": "Awarding of Order/Receipt of Order - Receipt of order worth Rs. 120.4 Cr from Ministry of Defence", "category": "Award of Order / Receipt of Order", "date_sort": "2026-05-30T17:42:00", "date": "30 May 2026, 17:42", "attachment": "https://www.bseindia.com/xml-data/corpfiling/AttachLive/demo_dp_order.pdf", "flag": "GREEN", "keyword": "receipt of order"}, {"subject": "Board Meeting Outcome - Audited Standalone & Consolidated Financial Results for Q4FY26", "category": "Result", "date_sort": "2026-05-26T18:05:00", "date": "26 May 2026, 18:05", "attachment": "https://www.bseindia.com/xml-data/corpfiling/AttachLive/demo_dp_results.pdf", "flag": "NEUTRAL", "keyword": ""}]}, {"bse_code": "544090", "nse_symbol": "AZAD", "company": "Azad Engineering", "sector": "Precision Engineering / Aerospace", "thesis_status": "Stable", "conviction": "Medium", "original_thesis": "Precision components for aerospace/energy turbines; multi-year qualification moat with global OEMs.", "watch_items": "Customer concentration; valuation rich vs near-term earnings.", "position": "1.5%", "last_reviewed": "2026-05-15", "worst_flag": "RED", "counts": {"RED": 1, "AMBER": 0, "GREEN": 0, "NEUTRAL": 0}, "new_count": 1, "has_data": true, "announcements": [{"subject": "Creation of Encumbrance - Pledge of shares by promoter group", "category": "Encumbrance", "date_sort": "2026-05-30T15:48:00", "date": "30 May 2026, 15:48", "attachment": "https://www.bseindia.com/xml-data/corpfiling/AttachLive/demo_azad_pledge.pdf", "flag": "RED", "keyword": "pledge"}]}, {"bse_code": "532259", "nse_symbol": "APARINDS", "company": "Apar Industries", "sector": "Specialty Cables / Conductors", "thesis_status": "Stable", "conviction": "Medium", "original_thesis": "Conductor and specialty oil leader with export and grid-capex tailwinds.", "watch_items": "Commodity margin swings; export tariff/logistics risk.", "position": "1.0%", "last_reviewed": "2026-05-10", "worst_flag": "AMBER", "counts": {"RED": 0, "AMBER": 1, "GREEN": 0, "NEUTRAL": 1}, "new_count": 2, "has_data": true, "announcements": [{"subject": "Board Meeting Intimation for considering Q4 results and dividend", "category": "Board Meeting", "date_sort": "2026-05-22T10:15:00", "date": "22 May 2026, 10:15", "attachment": "https://www.bseindia.com/xml-data/corpfiling/AttachLive/demo_apar_bm.pdf", "flag": "NEUTRAL", "keyword": ""}, {"subject": "Credit Rating reaffirmed at AA-/Stable by ICRA", "category": "Credit Rating", "date_sort": "2026-05-21T14:02:00", "date": "21 May 2026, 14:02", "attachment": "https://www.bseindia.com/xml-data/corpfiling/AttachLive/demo_apar_rating.pdf", "flag": "AMBER", "keyword": "credit rating"}]}, {"bse_code": "540900", "nse_symbol": "NEWGEN", "company": "Newgen Software Technologies", "sector": "Software Products", "thesis_status": "Watch", "conviction": "Medium", "original_thesis": "Low-code platform for BFSI process automation; recurring revenue mix improving.", "watch_items": "Lumpy license deals; USD/INR and BFSI IT-spend cyclicality.", "position": "0.0%", "last_reviewed": "2026-05-12", "worst_flag": "GREEN", "counts": {"RED": 0, "AMBER": 0, "GREEN": 1, "NEUTRAL": 0}, "new_count": 1, "has_data": true, "announcements": [{"subject": "Press Release - Bagged a large order from a leading public sector bank for low-code platform", "category": "Press Release", "date_sort": "2026-05-25T16:30:00", "date": "25 May 2026, 16:30", "attachment": "https://www.bseindia.com/xml-data/corpfiling/AttachLive/demo_newgen_order.pdf", "flag": "GREEN", "keyword": "bagged"}]}]};
const el = (t, c, txt) => { const e = document.createElement(t); if(c) e.className=c;
  if(txt!=null) e.textContent=txt; return e; };
let filter = "ALL", sortKey = "worst_flag", sortDir = -1, query = "";
const FORDER = {RED:3, AMBER:2, GREEN:1, NEUTRAL:0};

function cards(){
  const s = DATA.summary, box = document.getElementById("cards");
  const defs = [["names","Names tracked",""],["red","Red flags","red"],
    ["amber","Amber flags","amber"],["green","Positive signals","green"],
    ["new_total","New filings",""],["no_data","No data / check code",""]];
  defs.forEach(([k,l,c])=>{ const card=el("div","card "+c);
    card.append(el("div","n",s[k]), el("div","l",l)); box.append(card); });
}

function alerts(){
  const box = document.getElementById("alerts");
  document.getElementById("alertwin").textContent =
    "(RED & AMBER in last "+DATA.lookback_days+" days)";
  if(!DATA.alerts.length){ box.append(el("div","sub","No red or amber events in the window. Quiet is good.")); return; }
  DATA.alerts.forEach(a=>{
    const row = el("div","alert "+a.flag);
    const left = el("div"); left.append(el("div","co",a.company || a.code));
    left.append(el("span","pill "+a.flag, a.flag));
    const body = el("div"); body.style.flex="1";
    body.append(el("div","", a.subject));
    const meta = el("div","meta");
    meta.textContent = a.date + (a.category? "  ·  "+a.category : "") +
      (a.keyword? "  ·  matched: \""+a.keyword+"\"" : "");
    body.append(meta);
    if(a.attachment){ const lk=el("a",null,"open filing ↗"); lk.href=a.attachment;
      lk.target="_blank"; lk.style.cssText="color:var(--accent);font-size:12px"; body.append(lk); }
    row.append(left, body); box.append(row);
  });
}

function sortVal(c){
  if(sortKey==="worst_flag") return FORDER[c.worst_flag];
  if(sortKey==="new_count") return c.new_count;
  return (c[sortKey]||"").toString().toLowerCase();
}

function table(){
  const tb = document.getElementById("tbody"); tb.innerHTML="";
  let rows = DATA.companies.filter(c=>{
    if(filter!=="ALL" && c.worst_flag!==filter) return false;
    if(query){ const h=(c.company+" "+c.nse_symbol+" "+c.sector).toLowerCase();
      if(!h.includes(query)) return false; }
    return true;
  });
  rows.sort((a,b)=>{ const x=sortVal(a),y=sortVal(b);
    return (x>y?1:x<y?-1:0)*sortDir; });

  rows.forEach(c=>{
    const tr = el("tr","row");
    const c1 = el("td"); c1.append(el("span","dot "+c.worst_flag));
    c1.append(document.createTextNode(c.company + (c.nse_symbol? "  ("+c.nse_symbol+")":"")));
    tr.append(c1);
    tr.append(el("td",null,c.sector));
    const st=el("td"); st.append(el("span","status "+c.thesis_status, c.thesis_status)); tr.append(st);
    tr.append(el("td",null,c.conviction||"—"));
    tr.append(el("td",null,String(c.new_count)));
    const fl=el("td"); fl.append(el("span","pill "+c.worst_flag, c.worst_flag)); tr.append(fl);
    tr.append(el("td",null,c.last_reviewed||"—"));

    const drow = el("tr","detail hide"); const dcell=el("td"); dcell.colSpan=7;
    dcell.append(detail(c)); drow.append(dcell);
    tr.onclick=()=>drow.classList.toggle("hide");
    tb.append(tr, drow);
  });
  if(!rows.length) tb.append(el("tr")).append(el("td","sub","No names match."));
}

function detail(c){
  const wrap=el("div","inner");
  const th=el("div","thesis");
  th.append(el("h4",null,"Living thesis"));
  const add=(k,v)=>{ const p=el("p"); p.append(el("span","k",k+": "));
    p.append(document.createTextNode(v||"—")); th.append(p); };
  add("Original", c.original_thesis); add("Watch items", c.watch_items);
  add("Position", c.position); add("Conviction", c.conviction);
  add("Last reviewed", c.last_reviewed);
  wrap.append(th);

  const ann=el("div");
  ann.append(el("h4",null,"Recent announcements ("+(c.has_data?c.announcements.length:"no data")+")"));
  if(!c.has_data){ ann.append(el("div","nodata",
    "No announcements returned — verify the BSE scrip code for this name.")); }
  const list=el("div","annlist");
  c.announcements.forEach(a=>{ const d=el("div","ann "+a.flag);
    d.append(el("span","s", a.subject));
    const m=el("span","m"); m.textContent=a.date+(a.category?"  ·  "+a.category:"")+
      (a.flag!=="NEUTRAL"?"  ·  "+a.flag:"");
    d.append(m);
    if(a.attachment){ d.append(document.createElement("br"));
      const lk=el("a",null,"open filing ↗"); lk.href=a.attachment; lk.target="_blank"; d.append(lk); }
    list.append(d); });
  ann.append(list); wrap.append(ann);
  return wrap;
}

function wire(){
  document.getElementById("subline").textContent =
    "Generated "+DATA.generated_at+"  ·  source: "+DATA.source+
    "  ·  lookback "+DATA.lookback_days+" days";
  document.querySelectorAll(".fbtn").forEach(b=> b.onclick=()=>{
    document.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active"); filter=b.dataset.f; table(); });
  document.getElementById("search").oninput=e=>{ query=e.target.value.toLowerCase().trim(); table(); };
  document.querySelectorAll("th[data-k]").forEach(h=> h.onclick=()=>{
    const k=h.dataset.k; if(sortKey===k) sortDir*=-1; else {sortKey=k; sortDir=1;}
    table(); });
  document.getElementById("foot").innerHTML =
    "Personal research tool — <b>not investment advice</b>, no buy/sell calls, no price targets. "+
    "Flags are keyword heuristics to triage which filings to read; always confirm against the "+
    "primary BSE/NSE filing and the company's disclosures before acting. Keyword rules are "+
    "editable in monitor.py.";
}

cards(); alerts(); wire(); table();
</script>
</body>
</html>
