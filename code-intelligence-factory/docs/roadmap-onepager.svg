<svg viewBox="0 0 1480 810" width="1480" height="810" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="rm-title rm-desc">
  <title id="rm-title">Code Intelligence Factory - Delivery Roadmap (stakeholder one-pager)</title>
  <desc id="rm-desc">Stakeholder roadmap. Plan date 6-10 months at one full-time engineer; committed about 11 months at 80 percent confidence; fixed constraint is scope, so time is the output. Four stages: Foundations and spine (M0-M2, ~0-2.5 months); One-time factory (M3-M4, ~3-5 months, proves goals 1-3, gates G1 G2); Wiring and payoff (M5-M6, ~5-8 months, proves goals 4-7, gate G3); Continuous and hardening (M7-M8, ~6-10 months). Biggest lever: a second engineer saves ~6-10 weeks. Top risks: RE accuracy, solo single point of failure, Jira admin dependency.</desc>
  <defs>
    <style>
      text{font-family:'Inter','Segoe UI',system-ui,-apple-system,Roboto,'Helvetica Neue',sans-serif;}
      .title{font-size:30px;font-weight:700;fill:#26215C;}
      .sub{font-size:14px;fill:#5F5E5A;}
      .meta{font-size:12px;fill:#888780;}
      .klabel{font-size:11px;font-weight:700;fill:#6F6E68;letter-spacing:1.2px;}
      .kbig{font-size:24px;font-weight:700;fill:#26215C;}
      .ksub{font-size:12px;fill:#5F5E5A;}
      .sname{font-size:15.5px;font-weight:700;fill:#26215C;}
      .stag{font-size:11px;font-weight:700;fill:#7F77DD;}
      .srange{font-size:13px;font-weight:700;fill:#26215C;}
      .scap{font-size:11px;font-weight:700;fill:#6F6E68;letter-spacing:1px;}
      .sout{font-size:12.5px;fill:#2C2C2A;}
      .pill{font-size:10.5px;font-weight:700;fill:#26215C;}
      .gpill{font-size:10.5px;font-weight:700;fill:#633806;}
      .risk-t{font-size:12.5px;font-weight:700;fill:#2C2C2A;}
      .risk-s{font-size:11.5px;fill:#5F5E5A;}
      .tk{font-size:11px;fill:#888780;}
      .segn{font-size:12px;font-weight:700;}
      .lev{font-size:13px;fill:#633806;}
    </style>
  </defs>

  <text x="40" y="56" class="title">Code Intelligence Factory</text>
  <text x="40" y="84" class="sub">Delivery roadmap &#8212; recover trustworthy requirements from undocumented systems, and prove &#8220;requirement gap or developer miss?&#8221;</text>
  <text x="1456" y="50" text-anchor="end" class="meta">Plan v1 &#183; 2026-05-30</text>
  <text x="1456" y="70" text-anchor="end" class="meta">baseline: ARCHITECTURE.md v0.2</text>
  <line x1="40" y1="100" x2="1456" y2="100" stroke="#D3D1C7" stroke-width="1"/>

  <rect x="40" y="116" width="448" height="74" rx="8" fill="#F7F6FD" stroke="#534AB7" stroke-width="1.5"/>
  <text x="60" y="139" class="klabel">PLAN DATE</text>
  <text x="60" y="168" class="kbig">6-10 months</text>
  <text x="60" y="184" class="ksub">1 FTE solo &#183; even odds</text>
  <rect x="516" y="116" width="448" height="74" rx="8" fill="#F7F6FD" stroke="#534AB7" stroke-width="1.5"/>
  <text x="536" y="139" class="klabel">COMMITTED</text>
  <text x="536" y="168" class="kbig">~11 months</text>
  <text x="536" y="184" class="ksub">~80% confidence &#183; buffered</text>
  <rect x="992" y="116" width="464" height="74" rx="8" fill="#F7F6FD" stroke="#534AB7" stroke-width="1.5"/>
  <text x="1012" y="139" class="klabel">FIXED CONSTRAINT</text>
  <text x="1012" y="168" class="kbig">Scope</text>
  <text x="1012" y="184" class="ksub">team solo &#183; time is the output</text>

  <rect x="40" y="214" width="335" height="240" rx="10" fill="#F5F4FD" stroke="#7F77DD" stroke-width="1.75"/>
  <text x="58" y="246" class="sname">Foundations &amp; spine</text>
  <text x="58" y="270" class="stag">M0 &#183; M1 &#183; M2</text>
  <text x="357" y="270" text-anchor="end" class="srange">~0-2.5 mo</text>
  <line x1="54" y1="284" x2="361" y2="284" stroke="#DAD7F0" stroke-width="1"/>
  <text x="58" y="308" class="scap">BUILDS</text>
  <text x="58" y="330" class="sout">The traceable engine:</text>
  <text x="58" y="349" class="sout">de-risk spikes, then the</text>
  <text x="58" y="368" class="sout">spine + orchestrator.</text>
  <rect x="58" y="410" width="92" height="22" rx="11" fill="#EEEDFE" stroke="#7F77DD"/>
  <text x="104" y="425" text-anchor="middle" class="pill">Foundation</text>

  <rect x="397" y="214" width="335" height="240" rx="10" fill="#F5F4FD" stroke="#7F77DD" stroke-width="1.75"/>
