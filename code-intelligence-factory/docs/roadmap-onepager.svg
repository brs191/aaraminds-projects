  <text x="455" y="521" text-anchor="middle" class="segn" fill="#26215C">2</text>
  <text x="707" y="521" text-anchor="middle" class="segn" fill="#FFFFFF">3</text>
  <text x="903" y="521" text-anchor="middle" class="segn" fill="#FFFFFF">4</text>
  <text x="1178" y="521" text-anchor="middle" class="segn" fill="#888780">buffer</text>
  <circle cx="476" cy="506" r="6" fill="#FAC775" stroke="#BA7517"/>
  <text x="476" y="499" text-anchor="middle" class="tk" fill="#633806">G1</text>
  <circle cx="584" cy="506" r="6" fill="#FAC775" stroke="#BA7517"/>
  <text x="600" y="499" class="tk" fill="#633806">G2</text>
  <circle cx="830" cy="506" r="6" fill="#FAC775" stroke="#BA7517"/>
  <text x="830" y="499" text-anchor="middle" class="tk" fill="#633806">G3</text>
  <line x1="80" y1="528" x2="80" y2="535" stroke="#B4B2A9"/><text x="80" y="547" text-anchor="middle" class="tk">0</text>
  <line x1="316" y1="528" x2="316" y2="535" stroke="#B4B2A9"/><text x="316" y="547" text-anchor="middle" class="tk">2</text>
  <line x1="553" y1="528" x2="553" y2="535" stroke="#B4B2A9"/><text x="553" y="547" text-anchor="middle" class="tk">4</text>
  <line x1="789" y1="528" x2="789" y2="535" stroke="#B4B2A9"/><text x="789" y="547" text-anchor="middle" class="tk">6</text>
  <line x1="1026" y1="528" x2="1026" y2="535" stroke="#B4B2A9"/><text x="1026" y="547" text-anchor="middle" class="tk">8</text>
  <line x1="1262" y1="528" x2="1262" y2="535" stroke="#B4B2A9"/><text x="1262" y="547" text-anchor="middle" class="tk">10</text>
  <line x1="1380" y1="500" x2="1380" y2="535" stroke="#534AB7" stroke-width="1.5"/>
  <text x="1380" y="547" text-anchor="middle" class="tk" fill="#534AB7">~11 committed</text>

  <rect x="40" y="566" width="1416" height="50" rx="9" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="60" y="588" class="lev"><tspan font-weight="700">Biggest lever:</tspan> a 2nd engineer running the Go/MCP + GitHub + QA workstream in parallel with the Python agents &#8594; ~6-10 weeks sooner.</text>
  <text x="60" y="606" class="lev">Solo is the main schedule risk; the plan assumes sustained full-time focus.</text>

  <text x="40" y="644" class="klabel">TOP RISKS</text>
  <rect x="40" y="654" width="448" height="72" rx="8" fill="#F7F6FD" stroke="#B4B2A9"/>
  <text x="60" y="680" class="risk-t">RE accuracy on real code</text>
  <text x="60" y="701" class="risk-s">Retired first by the M0 spike.</text>
  <rect x="516" y="654" width="448" height="72" rx="8" fill="#F7F6FD" stroke="#B4B2A9"/>
  <text x="536" y="680" class="risk-t">Solo = single point of failure</text>
  <text x="536" y="701" class="risk-s">See lever; assumes sustained 1 FTE.</text>
  <rect x="992" y="654" width="464" height="72" rx="8" fill="#F7F6FD" stroke="#B4B2A9"/>
  <text x="1012" y="680" class="risk-t">Jira admin / custom fields</text>
  <text x="1012" y="701" class="risk-s">External dependency &#8212; resolve early (gates M4-M5).</text>

  <text x="40" y="758" class="meta">Date is the output of a fixed-scope, solo plan &#8212; a baseline to re-cut after the M0 spikes, not a fixed commitment.  &#183;  Full detail: docs/DELIVERY-PLAN.md</text>
  <text x="40" y="778" class="meta">Roadmap view per AaraMinds Project Planner (Milestone Roadmap mode).</text>
</svg>
