  <text x="415" y="270" class="stag">M3 &#183; M4</text>
  <text x="714" y="270" text-anchor="end" class="srange">~3-5 mo</text>
  <line x1="411" y1="284" x2="718" y2="284" stroke="#DAD7F0" stroke-width="1"/>
  <text x="415" y="308" class="scap">DELIVERS</text>
  <text x="415" y="330" class="sout">BRD / HLD / LLD + a</text>
  <text x="415" y="349" class="sout">Jira backlog, recovered</text>
  <text x="415" y="368" class="sout">from undocumented code.</text>
  <rect x="415" y="410" width="96" height="22" rx="11" fill="#EEEDFE" stroke="#7F77DD"/>
  <text x="463" y="425" text-anchor="middle" class="pill">Proves #1-3</text>
  <rect x="523" y="410" width="76" height="22" rx="11" fill="#FAC775" stroke="#BA7517"/>
  <text x="561" y="425" text-anchor="middle" class="gpill">Gates G1 G2</text>

  <rect x="754" y="214" width="335" height="240" rx="10" fill="#F5F4FD" stroke="#7F77DD" stroke-width="1.75"/>
  <text x="772" y="246" class="sname">Wiring &amp; payoff</text>
  <text x="772" y="270" class="stag">M5 &#183; M6</text>
  <text x="1071" y="270" text-anchor="end" class="srange">~5-8 mo</text>
  <line x1="768" y1="284" x2="1075" y2="284" stroke="#DAD7F0" stroke-width="1"/>
  <text x="772" y="308" class="scap">DELIVERS</text>
  <text x="772" y="330" class="sout">PR &#8594; requirement</text>
  <text x="772" y="349" class="sout">traceability, and the</text>
  <text x="772" y="368" class="sout">defect &#8594; gap verdict.</text>
  <rect x="772" y="410" width="96" height="22" rx="11" fill="#EEEDFE" stroke="#7F77DD"/>
  <text x="820" y="425" text-anchor="middle" class="pill">Proves #4-7</text>
  <rect x="880" y="410" width="56" height="22" rx="11" fill="#FAC775" stroke="#BA7517"/>
  <text x="908" y="425" text-anchor="middle" class="gpill">Gate G3</text>

  <rect x="1111" y="214" width="345" height="240" rx="10" fill="#F5F4FD" stroke="#7F77DD" stroke-width="1.75"/>
  <text x="1129" y="246" class="sname">Continuous &amp; hardening</text>
  <text x="1129" y="270" class="stag">M7 &#183; M8</text>
  <text x="1438" y="270" text-anchor="end" class="srange">~6-10 mo</text>
  <line x1="1125" y1="284" x2="1442" y2="284" stroke="#DAD7F0" stroke-width="1"/>
  <text x="1129" y="308" class="scap">DELIVERS</text>
  <text x="1129" y="330" class="sout">Docs stay in sync as</text>
  <text x="1129" y="349" class="sout">code changes;</text>
  <text x="1129" y="368" class="sout">production-ready.</text>
  <rect x="1129" y="410" width="94" height="22" rx="11" fill="#EEEDFE" stroke="#7F77DD"/>
  <text x="1176" y="425" text-anchor="middle" class="pill">Continuous</text>

  <text x="40" y="492" class="klabel">TIMELINE &#183; MONTHS FROM START (DATE IS THE OUTPUT, NOT A DEADLINE)</text>
  <rect x="80" y="506" width="246" height="22" fill="#CECBF6"/>
  <rect x="326" y="506" width="258" height="22" fill="#AFA9EC"/>
  <rect x="584" y="506" width="246" height="22" fill="#7F77DD"/>
  <rect x="830" y="506" width="147" height="22" fill="#534AB7"/>
  <rect x="977" y="506" width="403" height="22" fill="#ECEAE3"/>
