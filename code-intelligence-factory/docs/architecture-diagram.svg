<svg viewBox="0 0 1480 920" width="1480" height="920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="cif-title cif-desc">
  <title id="cif-title">Code Intelligence Factory - Reference Architecture (LangGraph)</title>
  <desc id="cif-desc">Layered architecture: external systems of record (Jira, GitHub, target codebase); an orchestration and services tier with a LangGraph runtime (Python), Go MCP servers, a traceability service, and human gates via interrupt plus PR review; five LangGraph agent subgraphs (Reverse Engineering, Business Analyst, Scrum Master, QA, Gap Analysis) with three human gates; a persistence tier of Git, Graph DB, Object Store and a Postgres checkpointer; and the traceability spine BRD to HLD to LLD to User Story to PR to Test to Defect to Gap.</desc>
