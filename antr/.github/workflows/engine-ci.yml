name: engine-ci

# Verifies the deterministic engine and its twin + the Phase-4 visualization gate
# on every push / PR. Closes the "no CI actually runs this" gap and NB-01
# (Phase-3 generator tests were never wired in).

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "antr/engine/**"
      - "antr/phase-1/**"
      - "antr/phase-3/**"
      - "antr/phase-4/**"
      - "antr/.github/workflows/**"

defaults:
  run:
    working-directory: antr

permissions:
  contents: read

jobs:
  go-engine:
    name: Go engine (build, vet, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: build
        run: cd engine/go && go build ./...
      - name: vet
        run: cd engine/go && go vet ./...
      - name: gofmt (must be clean)
        run: cd engine/go && test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: test
        run: cd engine/go && go test ./...

  python-reference:
    name: Python reference engine (oracle + V4-07)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: golden oracle
        run: cd engine && python3 reference/test_analyze.py
      - name: V4-07 resource-id keying
        run: cd engine && python3 reference/test_resource_id.py

  twin-drift:
    name: Twin-drift (Python ref == Go engine)
    runs-on: ubuntu-latest
    needs: [go-engine, python-reference]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: diff both engines on every shared fixture
        run: python3 engine/twin_drift_check.py

  diagram-eval-gate:
    name: Phase-4 diagram-eval gate (REQUIRED)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: RC1-RC5 + structure + severity coverage over the corpus
        run: |
          python3 phase-4/viz/eval_diagram.py \
            --fixtures phase-4/fixtures phase-1/eval/fixtures \
            --report phase-4/out/diagram_eval.json
      - name: render determinism (byte-identical re-render)
        run: |
          python3 - <<'PY'
          import sys, json, hashlib, glob
          sys.path.insert(0, "phase-4/viz")
          import render_drawio as rd
          for p in glob.glob("phase-4/fixtures/*.json"):
              fx = json.load(open(p))
              a = rd.render(fx, "mld")[0]; b = rd.render(fx, "mld")[0]
              assert a == b, "non-deterministic render: %s" % p
          print("render determinism OK")
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diagram-eval-report
          path: antr/phase-4/out/diagram_eval.json

  phase3-generator:
    name: Phase-3 generator tests (NB-01)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install + test generator (stub mode)
        env:
          GENERATOR_MODE: stub
        run: |
          if [ -f phase-3/generator/pyproject.toml ]; then
            pip install -e "phase-3/generator[dev]" || pip install -e phase-3/generator
          fi
          pytest phase-3/generator/tests/ -v

  phase1-explainer:
    name: Phase-1 explainer tests (stub mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: explainer tests
        env:
          EXPLAINER_MODE: stub
        run: |
          if [ -f phase-1/explainer/requirements.txt ]; then
            pip install -r phase-1/explainer/requirements.txt
          fi
          if [ -d phase-1/explainer/tests ]; then
            pytest phase-1/explainer/tests/ -v
          else
            echo "no explainer tests dir; skipping"
          fi
