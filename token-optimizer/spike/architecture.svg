<svg width="100%" viewBox="0 0 680 685" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Token Optimizer Option C spike kit architecture</title>
<desc>Coding agents and the measure.py A/B harness route requests through a self-hosted LiteLLM proxy that runs an LLMLingua-2 compression hook before forwarding to the LLM provider. The hook writes per-request metrics and the harness writes A/B results; summarize.py aggregates both against a decision gate.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.t{font-family:sans-serif;font-size:14px;fill:#2C2C2A}
.ts{font-family:sans-serif;font-size:12px;fill:#5F5E5A}
.th{font-family:sans-serif;font-size:14px;font-weight:500;fill:#2C2C2A}
.gray-fill{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}
.gray-t{fill:#2C2C2A}.gray-ts{fill:#5F5E5A}
.purple-fill{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5}
.purple-t{fill:#26215C}.purple-ts{fill:#534AB7}
.teal-fill{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
.teal-t{fill:#04342C}.teal-ts{fill:#0F6E56}
</style>
</defs>

<rect x="80" y="24" width="13" height="13" rx="3" class="gray-fill"/>
<text class="ts" x="100" y="34">external</text>
<rect x="186" y="24" width="13" height="13" rx="3" class="purple-fill"/>
<text class="ts" x="206" y="34">spike kit</text>
<rect x="296" y="24" width="13" height="13" rx="3" class="teal-fill"/>
<text class="ts" x="316" y="34">data &amp; gate</text>

<rect x="80" y="52" width="180" height="56" rx="4" class="gray-fill"/>
<text class="th gray-t" x="170" y="79" text-anchor="middle">Coding agents</text>
<text class="ts gray-ts" x="170" y="97" text-anchor="middle">Claude Code, Cursor</text>

<rect x="55" y="148" width="425" height="170" rx="6" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="5 4"/>
<text class="th" x="325" y="172" text-anchor="middle">LiteLLM proxy &#183; localhost:4000</text>

<rect x="80" y="200" width="180" height="80" rx="4" class="purple-fill"/>
<text class="th purple-t" x="170" y="235" text-anchor="middle">compression hook</text>
<text class="ts purple-ts" x="170" y="256" text-anchor="middle">LLMLingua-2 hook</text>

<rect x="290" y="200" width="170" height="80" rx="4" class="purple-fill"/>
<text class="th purple-t" x="375" y="235" text-anchor="middle">model aliases</text>
<text class="ts purple-ts" x="375" y="256" text-anchor="middle">compressed + -raw</text>

<rect x="515" y="200" width="125" height="80" rx="4" class="purple-fill"/>
<text class="th purple-t" x="577" y="235" text-anchor="middle">A/B harness</text>
<text class="ts purple-ts" x="577" y="256" text-anchor="middle">measure.py</text>

<rect x="270" y="362" width="210" height="58" rx="4" class="gray-fill"/>
<text class="th gray-t" x="375" y="389" text-anchor="middle">LLM provider</text>
<text class="ts gray-ts" x="375" y="407" text-anchor="middle">Azure OpenAI / Anthropic</text>

<rect x="80" y="470" width="190" height="58" rx="4" class="teal-fill"/>
<text class="th teal-t" x="175" y="497" text-anchor="middle">requests.jsonl</text>
<text class="ts teal-ts" x="175" y="515" text-anchor="middle">real-usage metrics</text>

<rect x="450" y="470" width="190" height="58" rx="4" class="teal-fill"/>
<text class="th teal-t" x="545" y="497" text-anchor="middle">ab_results.jsonl</text>
<text class="ts teal-ts" x="545" y="515" text-anchor="middle">A/B token + latency</text>

<rect x="175" y="584" width="185" height="58" rx="4" class="purple-fill"/>
<text class="th purple-t" x="267" y="611" text-anchor="middle">summarize.py</text>
<text class="ts purple-ts" x="267" y="629" text-anchor="middle">aggregates metrics</text>

<rect x="420" y="584" width="190" height="58" rx="4" class="teal-fill"/>
<text class="th teal-t" x="515" y="611" text-anchor="middle">decision gate</text>
<text class="ts teal-ts" x="515" y="629" text-anchor="middle">green &#183; amber &#183; red</text>

<line x1="170" y1="108" x2="170" y2="196" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="262" y1="240" x2="286" y2="240" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="513" y1="240" x2="464" y2="240" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="368" y1="282" x2="368" y2="358" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="384" y1="360" x2="384" y2="284" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="160" y1="282" x2="160" y2="466" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="577" y1="282" x2="555" y2="466" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M175,528 L175,560 L210,560 L210,581" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M545,528 L545,572 L320,572 L320,581" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="360" y1="613" x2="417" y2="613" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
