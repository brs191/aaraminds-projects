<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" width="1500" height="1000" role="img" aria-labelledby="t d">
<title id="t">AI Token Optimizer — Production-Grade Architecture</title>
<desc id="d">Implementation-ready architecture: seven supervised processes on the developer workstation with concrete binaries, ports, IPC, on-disk paths, per-OS supervision. IDE plugin sets assistant base URL to http://127.0.0.1:43117. No source code leaves the workstation; agent egress is metadata only.</desc>
