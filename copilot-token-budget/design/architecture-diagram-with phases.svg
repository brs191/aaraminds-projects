  <text x="796" y="638" font-size="10.5" fill="#0f766e">webhook from COPILOT_BUDGET_TEAMS_WEBHOOK</text>
  <text x="796" y="656" font-size="10.5" fill="#0f766e">URL never logged · jitter retry</text>

  <!-- MCP -->
  <rect x="1146" y="524" width="406" height="218" rx="8" fill="#f0fdfa" stroke="#0f766e" stroke-width="1.5"/>
  <text x="1162" y="546" font-size="12.5" font-weight="700" fill="#134e4a">MCP server (phase-4 · Go · stdio)</text>
  <rect x="1164" y="558" width="370" height="92" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="1349" y="578" text-anchor="middle" font-size="11" font-weight="600" fill="#134e4a">6 tools</text>
  <text x="1349" y="596" text-anchor="middle" font-size="10.5" fill="#134e4a">get_budget_status · get_sessions</text>
  <text x="1349" y="612" text-anchor="middle" font-size="10.5" fill="#134e4a">get_instruction_overhead · get_model_costs</text>
  <text x="1349" y="628" text-anchor="middle" font-size="10.5" fill="#134e4a">get_usage_timeseries · get_top_consumers</text>
  <text x="1164" y="672" font-size="10.5" fill="#0f766e">path-traversal guarded · no stdout pollution</text>
  <rect x="1164" y="686" width="370" height="42" rx="6" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="1349" y="712" text-anchor="middle" font-size="11.5" fill="#312e81">→ Copilot CLI: "how's my budget?" mid-session</text>

