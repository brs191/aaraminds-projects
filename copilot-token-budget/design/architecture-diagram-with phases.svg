  <text x="48" y="514" font-size="12.5" font-weight="700" fill="#134e4a">3 · SURFACES — where engineers see it</text>

  <!-- Terminal -->
  <rect x="48" y="524" width="350" height="218" rx="8" fill="#f0fdfa" stroke="#0f766e" stroke-width="1.5"/>
  <text x="64" y="546" font-size="12.5" font-weight="700" fill="#134e4a">Terminal · Go CLI (phase-1)</text>
  <rect x="66" y="558" width="314" height="40" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="223" y="583" text-anchor="middle" font-size="11.5" fill="#134e4a">cmd/analyze — report · --json · --csv</text>
  <rect x="66" y="604" width="314" height="40" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="223" y="629" text-anchor="middle" font-size="11.5" fill="#134e4a">cmd/dashboard — live TUI + WezTerm badge</text>
  <rect x="66" y="650" width="314" height="40" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="223" y="675" text-anchor="middle" font-size="11.5" fill="#134e4a">cmd/statusline — ccusage-style one-liner</text>
  <text x="64" y="715" font-size="10.5" fill="#0f766e">run.sh launcher · macOS / Linux / Windows</text>

  <!-- VS Code -->
  <rect x="414" y="524" width="350" height="218" rx="8" fill="#f0fdfa" stroke="#0f766e" stroke-width="1.5"/>
  <text x="430" y="546" font-size="12.5" font-weight="700" fill="#134e4a">VS Code extension (phase-2 · TS)</text>
  <rect x="432" y="558" width="314" height="36" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="589" y="581" text-anchor="middle" font-size="11.5" fill="#134e4a">Status-bar badge (green/yellow/red)</text>
  <rect x="432" y="600" width="314" height="36" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="589" y="623" text-anchor="middle" font-size="11.5" fill="#134e4a">Tree view · Dashboard webview (CSP)</text>
  <rect x="432" y="642" width="314" height="36" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="589" y="665" text-anchor="middle" font-size="11.5" fill="#134e4a">Usage trend · Top consumers · Export</text>
  <text x="430" y="703" font-size="10.5" fill="#0f766e">settings: monthlyAllowance · pricingPath ·</text>
  <text x="430" y="719" font-size="10.5" fill="#0f766e">refreshIntervalSec · teamsWebhookUrl · …</text>

  <!-- Teams -->
  <rect x="780" y="524" width="350" height="218" rx="8" fill="#f0fdfa" stroke="#0f766e" stroke-width="1.5"/>
  <text x="796" y="546" font-size="12.5" font-weight="700" fill="#134e4a">Teams alerts (phase-3 · Go)</text>
  <rect x="798" y="558" width="314" height="40" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="955" y="583" text-anchor="middle" font-size="11.5" fill="#134e4a">cmd/alert → Adaptive Card</text>
