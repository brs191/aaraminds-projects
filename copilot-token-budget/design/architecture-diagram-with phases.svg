  <text x="228" y="983" text-anchor="middle" font-size="10.5" fill="#475569">ci.yml — build/vet/test -race + tsc</text>
  <text x="228" y="1000" text-anchor="middle" font-size="10.5" fill="#475569">release.yml — on tag v*.*.*</text>
  <text x="228" y="1017" text-anchor="middle" font-size="10.5" fill="#475569">least-privilege · OIDC (no stored tokens)</text>

  <path d="M408 984 H452" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrowslate)"/>
  <rect x="456" y="938" width="430" height="92" rx="7" fill="#f8fafc" stroke="#475569"/>
  <text x="671" y="962" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">GoReleaser v2  +  vsce</text>
  <text x="671" y="983" text-anchor="middle" font-size="10.5" fill="#475569">5 binaries × 5 platforms (darwin/linux amd64+arm64, win amd64)</text>
  <text x="671" y="1000" text-anchor="middle" font-size="10.5" fill="#475569">tar.gz / zip + sha256 checksums · .vsix (Node 22)</text>
  <text x="671" y="1017" text-anchor="middle" font-size="10.5" fill="#475569">--version embedded via ldflags</text>

  <path d="M886 984 H930" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrowslate)"/>
  <rect x="934" y="938" width="360" height="92" rx="7" fill="#f8fafc" stroke="#475569"/>
  <text x="1114" y="962" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">JFrog Artifactory</text>
  <text x="1114" y="983" text-anchor="middle" font-size="10.5" fill="#475569">binaries/&lt;tag&gt;/ · vsix/&lt;tag&gt;/</text>
  <text x="1114" y="1000" text-anchor="middle" font-size="10.5" fill="#475569">via jf rt upload (OIDC) — not Azure ACR (ADR-005)</text>
  <text x="1114" y="1017" text-anchor="middle" font-size="10.5" fill="#475569">+ GitHub Release w/ assets</text>

  <rect x="1318" y="938" width="234" height="92" rx="7" fill="#f8fafc" stroke="#475569"/>
  <text x="1435" y="962" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Engineer install</text>
  <text x="1435" y="983" text-anchor="middle" font-size="10.5" fill="#475569">install_vscode_extn.sh</text>
  <text x="1435" y="1000" text-anchor="middle" font-size="10.5" fill="#475569">onboarding runbook ≤5 min</text>
  <text x="1435" y="1017" text-anchor="middle" font-size="10.5" fill="#475569">all-OS</text>

