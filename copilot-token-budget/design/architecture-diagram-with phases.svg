<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="1600" height="1140" fill="#fafafa"/>

  <!-- Title -->
  <text x="800" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#1e293b">Copilot Token Budget — Local-First Architecture</text>
  <text x="800" y="66" text-anchor="middle" font-size="13.5" fill="#64748b">Reads the files the Copilot CLI already writes · zero network (ADR-001) · Go core + VS Code extension + MCP · estimates from a local price table</text>

  <!-- ===================== LOCAL MACHINE boundary ===================== -->
  <rect x="24" y="88" width="1552" height="700" rx="14" fill="none" stroke="#0f766e" stroke-width="2" stroke-dasharray="9 6"/>
  <rect x="40" y="78" width="360" height="22" rx="11" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="56" y="93" font-size="11.5" font-weight="700" fill="#134e4a">LOCAL MACHINE · ZERO NETWORK (ADR-001)</text>

  <!-- ===================== 1. LOCAL DATA SOURCES ===================== -->
  <text x="48" y="123" font-size="12.5" font-weight="700" fill="#92400e">1 · LOCAL DATA SOURCES (read-only)</text>

  <!-- CLI session-state -->
  <rect x="48" y="132" width="350" height="104" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="64" y="154" font-size="12.5" font-weight="700" fill="#92400e">GitHub Copilot CLI — session state</text>
  <text x="64" y="174" font-size="11" fill="#92400e">~/.copilot/session-state/&lt;uuid&gt;/events.jsonl</text>
  <text x="64" y="192" font-size="10.5" fill="#a16207">session.start · assistant.message · session.shutdown</text>
  <text x="64" y="208" font-size="10.5" fill="#a16207">totalNanoAiu · usage{in/out/cacheRead/cacheWrite/reasoning}</text>
  <text x="64" y="224" font-size="10.5" fill="#a16207">+ workspace.yaml · inuse.*.lock (active)</text>

  <!-- instruction files -->
  <rect x="414" y="132" width="300" height="104" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="430" y="154" font-size="12.5" font-weight="700" fill="#92400e">Instruction files</text>
  <text x="430" y="176" font-size="11" fill="#92400e">.github/instructions/**.md</text>
  <text x="430" y="196" font-size="10.5" fill="#a16207">always-loaded overhead — audited &amp; scored</text>
  <text x="430" y="214" font-size="10.5" fill="#a16207">~12K tokens / message (invisible cost)</text>

  <!-- pricing config -->
  <rect x="730" y="132" width="300" height="104" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="746" y="154" font-size="12.5" font-weight="700" fill="#92400e">Pricing config (optional)</text>
  <text x="746" y="176" font-size="11" fill="#92400e">~/.config/copilot-token-budget/pricing.json</text>
  <text x="746" y="196" font-size="10.5" fill="#a16207">override rates / allowance / context window</text>
  <text x="746" y="214" font-size="10.5" fill="#a16207">bundled defaults + merge (ADR-008)</text>

  <!-- IDE chat — PENDING -->
  <rect x="1046" y="132" width="506" height="104" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="1062" y="154" font-size="12.5" font-weight="700" fill="#64748b">VS Code Copilot Chat — SEPARATE source · Phase 6</text>
  <text x="1062" y="176" font-size="11" fill="#64748b">…/User/workspaceStorage/&lt;ws&gt;/chatSessions/ · GitHub.copilot-chat/transcripts/</text>
  <text x="1062" y="196" font-size="10.5" fill="#94a3b8">NOT ~/.copilot · token-count estimates (not credits)</text>
  <text x="1062" y="216" font-size="10.5" font-weight="700" fill="#94a3b8">NOT CAPTURED YET — collector is a no-op stub (ADR-007, corrected)</text>

  <!-- arrows sources -> core -->
  <g stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <path d="M223 236 V292"/>
    <path d="M564 236 V292"/>
    <path d="M880 236 V292"/>
  </g>
  <path d="M1299 236 V292" stroke="#cbd5e1" stroke-width="1.6" fill="none" stroke-dasharray="5 4" marker-end="url(#arrowmute)"/>

  <!-- ===================== 2. CORE DATA LAYER (Go) ===================== -->
  <rect x="48" y="292" width="1504" height="178" rx="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="64" y="315" font-size="12.5" font-weight="700" fill="#312e81">2 · CORE DATA LAYER — Go · phase-1/session-manager · zero external deps</text>

  <!-- core sub-boxes -->
  <g>
    <rect x="64" y="328" width="300" height="128" rx="7" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="214" y="350" text-anchor="middle" font-size="12.5" font-weight="700" fill="#312e81">session · Reader</text>
    <line x1="80" y1="360" x2="348" y2="360" stroke="#c7d2fe"/>
    <text x="80" y="380" font-size="10.5" fill="#3730a3">Collectors: cli ✓  ·  ide (stub)</text>
    <text x="80" y="398" font-size="10.5" fill="#3730a3">dedup-by-ID (final &gt; higher nanoAIU)</text>
    <text x="80" y="416" font-size="10.5" fill="#3730a3">running snapshot · isFinal (live vs settled)</text>
    <text x="80" y="434" font-size="10.5" fill="#3730a3">month-scope by END time · UTC</text>
  </g>
  <g>
    <rect x="380" y="328" width="222" height="128" rx="7" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="491" y="350" text-anchor="middle" font-size="12.5" font-weight="700" fill="#312e81">budget · pricing</text>
    <line x1="396" y1="360" x2="586" y2="360" stroke="#c7d2fe"/>
    <text x="396" y="380" font-size="10.5" fill="#3730a3">nanoAIU → credits → $</text>
    <text x="396" y="398" font-size="10.5" fill="#3730a3">status OK / WARN 60 / CRIT 90</text>
    <text x="396" y="416" font-size="10.5" fill="#3730a3">rates: Sonnet 300/1500,</text>
    <text x="396" y="432" font-size="10.5" fill="#3730a3">Opus 500/2500, Haiku 100/500</text>
  </g>
  <g>
    <rect x="618" y="328" width="222" height="128" rx="7" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="729" y="350" text-anchor="middle" font-size="12.5" font-weight="700" fill="#312e81">analytics</text>
    <line x1="634" y1="360" x2="824" y2="360" stroke="#c7d2fe"/>
    <text x="634" y="380" font-size="10.5" fill="#3730a3">daily / weekly / monthly (UTC)</text>
    <text x="634" y="398" font-size="10.5" fill="#3730a3">top sessions / models / projects</text>
    <text x="634" y="416" font-size="10.5" fill="#3730a3">context-window % per session</text>
    <text x="634" y="434" font-size="10.5" fill="#3730a3">anomaly: mean + 2σ</text>
  </g>
  <g>
    <rect x="856" y="328" width="222" height="128" rx="7" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="967" y="350" text-anchor="middle" font-size="12.5" font-weight="700" fill="#312e81">instructions</text>
    <line x1="872" y1="360" x2="1062" y2="360" stroke="#c7d2fe"/>
    <text x="872" y="380" font-size="10.5" fill="#3730a3">scan .github/instructions/</text>
    <text x="872" y="398" font-size="10.5" fill="#3730a3">per-file token estimate</text>
    <text x="872" y="416" font-size="10.5" fill="#3730a3">overhead cost (50-turn model)</text>
    <text x="872" y="434" font-size="10.5" fill="#3730a3">optimization summary</text>
  </g>
  <g>
    <rect x="1094" y="328" width="222" height="128" rx="7" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="1205" y="350" text-anchor="middle" font-size="12.5" font-weight="700" fill="#312e81">forecast</text>
    <line x1="1110" y1="360" x2="1300" y2="360" stroke="#c7d2fe"/>
    <text x="1110" y="380" font-size="10.5" fill="#3730a3">daily burn rate</text>
    <text x="1110" y="398" font-size="10.5" fill="#3730a3">projected month-end TOTAL</text>
    <text x="1110" y="416" font-size="10.5" fill="#3730a3">= used + burn × days left</text>
    <text x="1110" y="434" font-size="10.5" fill="#3730a3">model-routing recommender</text>
  </g>
  <g>
    <rect x="1332" y="328" width="204" height="128" rx="7" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="1434" y="350" text-anchor="middle" font-size="12.5" font-weight="700" fill="#312e81">export</text>
    <line x1="1348" y1="360" x2="1520" y2="360" stroke="#c7d2fe"/>
    <text x="1348" y="380" font-size="10.5" fill="#3730a3">Report → JSON (camelCase)</text>
    <text x="1348" y="398" font-size="10.5" fill="#3730a3">sessions / daily → CSV</text>
    <text x="1348" y="424" font-size="10" fill="#6366f1">cache + premium-request</text>
    <text x="1348" y="438" font-size="10" fill="#6366f1">data surfaced everywhere</text>
  </g>

