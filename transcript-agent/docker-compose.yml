# Podcast Transcript Agent — Postgres mode.
# NOTE: untested in this environment (no docker available) — see README.md.
#
#   docker compose up --build      # UI + API on http://localhost:8080
#
# Set SIGNING_SECRET (and AUTH_PROXY_SECRET behind a proxy) for anything
# beyond a local demo — identity is a dev stub pending SSO.
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      STORAGE: postgres
      DATABASE_URL: postgres://transcript:transcript@postgres:5432/transcript?sslmode=disable
      STT_PROVIDER: whisperx # local WhisperX sidecar below; set to "mock" to skip it
      WHISPERX_URL: http://stt-whisperx:9090
      # WHISPERX_TIMEOUT: 2h          # overall per-transcription deadline
      # SIGNING_SECRET: change-me     # signed links survive restarts when set
      # RETENTION_DAYS: "30"          # approved retention policy default
      # MAX_DURATION_SECONDS: "0"     # 0 = duration guardrail disabled
    volumes:
      - appdata:/data # local object store (audio, captions, exports)
    depends_on:
      postgres:
        condition: service_healthy
      stt-whisperx:
        condition: service_started
    restart: unless-stopped

  # WhisperX STT sidecar (CPU image; untested — no docker in the authoring
  # environment, correct by inspection). First run downloads the whisper
  # model (~1.5GB) into the whisper-cache volume. Speaker diarization needs
  # HF_TOKEN (gated pyannote models — see stt-sidecar/README.md); without it
  # jobs still succeed with null speakers.
  stt-whisperx:
    build: ./stt-sidecar
    ports:
      - "9090:9090"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      # WHISPER_MODEL: large-v3-turbo
      # DEVICE: cpu
    volumes:
      - whisper-cache:/root/.cache # HF + whisper model cache (~1.5GB+)
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: transcript
      POSTGRES_PASSWORD: transcript
      POSTGRES_DB: transcript
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transcript -d transcript"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  pgdata:
  appdata:
  whisper-cache:
